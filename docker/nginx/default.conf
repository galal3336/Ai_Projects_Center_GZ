server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn_limit 20;

    # ── Health check (Docker / load balancer probe) ───────────────────────────
    location = /up {
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # ── Sitemap & robots (no rate limit, crawler-friendly) ───────────────────
    location ~* ^/(sitemap.*\.xml|robots\.txt)$ {
        try_files $uri /index.php?$query_string;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Auth endpoints — strict rate limiting ─────────────────────────────────
    location ~* ^/[a-z]{2}/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;
        try_files $uri /index.php?$query_string;
        fastcgi_pass php_fpm;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
    }

    # ── API endpoints ─────────────────────────────────────────────────────────
    location ~* ^/[a-z]{2}/api/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri /index.php?$query_string;
        fastcgi_pass php_fpm;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
    }

    # ── Vite build assets (immutable, long cache) ─────────────────────────────
    location /build/ {
        expires max;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
        try_files $uri =404;
    }

    # ── Generic static assets ─────────────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    # ── Media library storage (spatie) ───────────────────────────────────────
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # ── Main application ──────────────────────────────────────────────────────
    location / {
        limit_req zone=global burst=30 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   php_fpm;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $realpath_root;
        fastcgi_param  PHP_VALUE       "upload_max_filesize=64M \n post_max_size=64M";

        fastcgi_buffer_size          128k;
        fastcgi_buffers              256 16k;
        fastcgi_busy_buffers_size    256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_connect_timeout      60s;
        fastcgi_send_timeout         60s;
        fastcgi_read_timeout         60s;
    }

    # ── Block dot-files / sensitive paths ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* /(\.env|\.git|composer\.(json|lock)|package\.json|phpunit\.xml) {
        deny all;
        return 404;
    }
}

upstream php_fpm {
    server 127.0.0.1:9000;
    keepalive 32;
}
